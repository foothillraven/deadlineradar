name = "deadlineradar-api"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# -- Reminder cron (Phase 3) -------------------------------------------
# Daily reminder scheduler. Fires index.ts's scheduled() once a day at
# 18:00 UTC (noon Mountain), which sends each confirmed subscriber the
# nearest newly-due escalation reminder (60/30/14/7/3/1 days out). The
# handler no-ops when SENDGRID_API_KEY is unset, so this trigger is inert
# until sending is configured.
[triggers]
crons = ["0 18 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "deadlineradar"
# Placeholder -- Cloudflare assigns the real UUID when `wrangler d1 create
# deadlineradar` is actually run against a real account. That command has
# NOT been run yet (no capital-deployment / account-creating action has
# happened -- see AssetLab CLAUDE.md guardrail 6 "Account-creating" and
# "Publish-to-external-platform"). Replace this value with the real
# database_id returned by `wrangler d1 create` immediately after that
# command is run, and not before.
database_id = "678e7b5a-e627-4c19-ab6f-2e249c0d7e1f"

[[routes]]
# NOT ACTIVE until `wrangler deploy` is actually run against a real
# Cloudflare account with this zone configured. Declaring the route here is
# inert configuration -- it does not register anything with Cloudflare, put
# anything on the public internet, or spend anything, until a real deploy
# happens. That deploy is a separate, later, explicitly-approved step (a
# "Publish-to-external-platform" action per AssetLab's guardrails).
pattern = "deadline-radar.com/api/*"
zone_name = "deadline-radar.com"
